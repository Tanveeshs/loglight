name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-cov
        pip install -e .

    - name: Install optional dependencies
      run: |
        pip install requests boto3 kafka-python
      continue-on-error: true

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Generate coverage report
      run: |
        pip install pytest-cov
        pytest tests/ --cov=loglight --cov-report=xml --cov-report=html
      continue-on-error: true

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
        pip install -e .

    - name: Lint with flake8
      run: |
        flake8 loglight --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 loglight --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Check code formatting with black
      run: |
        black --check loglight
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only loglight
      continue-on-error: true

