name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  test-before-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest
        pip install -e .

    - name: Run tests
      run: |
        pytest tests/ -v

  version-and-publish:
    needs: test-before-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Get version from release tag
      id: version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}
        else
          # For workflow_dispatch, bump the version
          CURRENT_VERSION=$(grep 'version = "' pyproject.toml | head -1 | sed -E 's/.*version = "([^"]*).*/\1/')
          echo "Current version: $CURRENT_VERSION"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "${{ github.event.inputs.version_type }}" in
            major)
              VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Update version in pyproject.toml
      if: github.event_name == 'workflow_dispatch'
      run: |
        sed -i 's/version = "[^"]*"/version = "${{ steps.version.outputs.version }}"/g' pyproject.toml
        cat pyproject.toml | grep version

    - name: Commit and tag version
      if: github.event_name == 'workflow_dispatch'
      run: |
        git add pyproject.toml
        git commit -m "Bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
        git tag "v${{ steps.version.outputs.version }}" || echo "Tag already exists"
        git push origin main --tags || git push origin develop --tags
      continue-on-error: true

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel build twine
        pip install -e .

    - name: Build distribution
      run: |
        python -m build

    - name: Check distribution
      run: |
        twine check dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/* --skip-existing

    - name: Create GitHub Release (if not exists)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        body: "Release version ${{ steps.version.outputs.version }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

